apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proof-sdk
  namespace: proof
  annotations:
    cert-manager.io/cluster-issuer: k8s-crt-mgr-iss-prd-apps-default
spec:
  tls:
    - hosts:
        - proof.df-app.ch
      secretName: proof-sdk-tls
  rules:
    - host: proof.df-app.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proof-sdk
                port:
                  number: 80
