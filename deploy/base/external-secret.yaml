apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: proof-sdk-secrets
  namespace: proof
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: proof-sdk-secrets
    creationPolicy: Owner
  data:
    - secretKey: PROOF_COLLAB_SIGNING_SECRET
      remoteRef:
        key: proof-sdk
        property: PROOF_COLLAB_SIGNING_SECRET
