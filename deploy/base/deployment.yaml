apiVersion: apps/v1
kind: Deployment
metadata:
  name: proof-sdk
  namespace: proof
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: proof-sdk
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proof-sdk
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: proof-sdk
          image: ghcr.io/uzh-bf/proof:latest
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 4000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: proof-sdk-config
            - secretRef:
                name: proof-sdk-secrets
          env:
            - name: DATABASE_PATH
              value: /data/db/proof-share.db
            - name: SNAPSHOT_DIR
              value: /data/snapshots
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: proof-sdk-data
